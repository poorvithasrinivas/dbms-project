<!DOCTYPE html>
<html>

<head>

    <title>Advanced Banking System</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .box{
            width:500px;
            margin:auto;
            margin-top:100px;
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px gray;
        }

        .btn{
            display:inline-block;
            width:180px;
            padding:15px;
            margin:10px;
            background:#001f8f;
            color:white;
            text-decoration:none;
            border-radius:5px;
            font-size:20px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Advanced Banking System</h1>

    <p>Welcome to Online Banking Portal</p>

    <a href="/deposit/" class="btn">
        Deposit
    </a>

    <a href="/withdraw/" class="btn">
        Withdraw
    </a>

    <br>

    <a href="/transfer/" class="btn">
        Transfer
    </a>

    <a href="/transactions/" class="btn">
        Transactions
    </a>

</div>

</body>
</html>
