<!DOCTYPE html>
<html>

<head>
<title>Transactions</title>

<style>

body{
font-family:Arial;
background:#edf2f7;
padding:30px;
}

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 0 15px lightgray;
}

table{

width:100%;

border-collapse:collapse;
}

th,td{

padding:15px;

border-bottom:1px solid lightgray;

text-align:center;
}

th{

background:#2563eb;

color:white;
}

</style>

</head>

<body>

<div class="card">

<h1>Transaction History</h1>

<table>

<tr>

<th>Type</th>
<th>Sender</th>
<th>Receiver</th>
<th>Amount</th>

</tr>

{% for x in data %}

<tr>

<td>{{x.transaction_type}}</td>

<td>{{x.sender_account}}</td>

<td>{{x.receiver_account}}</td>

<td>₹{{x.amount}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
