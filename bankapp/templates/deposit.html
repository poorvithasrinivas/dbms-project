<!DOCTYPE html>
<html>

<head>
    <title>Deposit Money</title>

    <style>

        body{
            font-family: Arial;
            background-color:#f2f2f2;
            text-align:center;
            padding-top:100px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:40px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
        }

        button{
            width:95%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            font-size:16px;
        }

        h2{
            color:green;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Deposit Money</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="number"
               name="account_number"
               placeholder="Enter Account Number"
               required>

        <input type="number"
               name="amount"
               placeholder="Enter Amount"
               required>

        <button type="submit">
            Deposit
        </button>

    </form>

    {% if success %}
        <h2>{{ success }}</h2>
        <h2>
    Updated Balance: ₹ {{ balance }}
</h2>
    {% endif %}

</div>

</body>
</html>
