<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Transfer – Bank</title>

    <style>

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #edf2f7;
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 230px;
            min-height: 100vh;
            background: #1e293b;
            padding: 20px;
            color: white;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .sidebar a {
            display: block;
            padding: 14px;
            margin: 15px 0;
            background: #334155;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: background 0.2s;
        }
        .sidebar a:hover  { background: #475569; }
        .sidebar a.active { background: #581c87; } /* purple accent for Transfer */

        /* ── Main content ── */
        .main {
            flex: 1;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* ── Page header ── */
        .page-header {
            width: 100%;
            max-width: 560px;
            margin-bottom: 28px;
            animation: fadeSlideDown 0.45s ease both;
        }
        .page-header h1 {
            font-size: 26px;
            color: #1e293b;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-header p {
            margin-top: 6px;
            color: #64748b;
            font-size: 14px;
        }

        /* ── Form card ── */
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(30, 41, 59, 0.10);
            padding: 36px 40px 40px;
            width: 100%;
            max-width: 560px;
            animation: fadeSlideUp 0.5s ease 0.1s both;
        }

        .form-section-header {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: #94a3b8;
            margin-bottom: 22px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* ── Two-column row for sender / receiver ── */
        .field-row {
            display: flex;
            gap: 16px;
            margin-bottom: 22px;
        }
        .field-row .field-group { flex: 1; margin-bottom: 0; }

        /* ── Field groups ── */
        .field-group { margin-bottom: 22px; }
        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 7px;
        }
        .field-group input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            font-family: Arial, sans-serif;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .field-group input:hover { border-color: #94a3b8; }
        .field-group input:focus {
            border-color: #7c3aed;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        /* Arrow divider between the account number fields */
        .transfer-arrow {
            display: flex;
            align-items: flex-end;
            padding-bottom: 13px;
            color: #94a3b8;
            font-size: 22px;
            flex-shrink: 0;
        }

        /* ── Submit button — purple theme for Transfer ── */
        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: linear-gradient(135deg, #581c87, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 700;
            font-family: Arial, sans-serif;
            letter-spacing: 0.4px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.2s;
            box-shadow: 0 4px 14px rgba(88, 28, 135, 0.28);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(124, 58, 237, 0.35);
        }
        .btn-submit:active { transform: translateY(0); }

        /* ── Alert banners ── */
        .feedback-banner {
            margin-top: 22px;
            padding: 16px 20px;
            border-radius: 12px;
            animation: fadeSlideUp 0.4s ease both;
        }
        .feedback-banner.success {
            background: #f0fdf4;
            border: 1.5px solid #bbf7d0;
        }
        .feedback-banner.success .fb-title { color: #15803d; }
        .feedback-banner.error {
            background: #fff1f2;
            border: 1.5px solid #fecdd3;
        }
        .feedback-banner.error .fb-title { color: #be123c; }
        .feedback-banner .fb-title { font-weight: 700; font-size: 15px; }

        /* ── Back link ── */
        .back-link {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
            animation: fadeSlideUp 0.5s ease 0.2s both;
        }
        .back-link a { color: #7c3aed; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }

        /* ── Animations ── */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; min-height: auto;
                display: flex; flex-wrap: wrap;
                align-items: center; gap: 8px; padding: 14px 16px;
            }
            .sidebar h2 { width: 100%; margin-bottom: 0; }
            .sidebar a  { margin: 0; padding: 10px 14px; font-size: 13px; }
            .main       { padding: 24px 16px; }
            .form-card  { padding: 28px 22px 32px; }
            /* Stack sender / receiver vertically on small screens */
            .field-row  { flex-direction: column; gap: 0; }
            .field-row .field-group { margin-bottom: 22px; }
            .transfer-arrow { display: none; }
        }

    </style>
</head>
<body>

    <!-- ── Sidebar Navigation ── -->
    <div class="sidebar">
        <h2>🏦 BANK</h2>
        <a href="/">Dashboard</a>
        <a href="/add/">Add Customer</a>
        <a href="/deposit/">Deposit</a>
        <a href="/withdraw/">Withdraw</a>
        <a href="/transfer/" class="active">Transfer</a>
        <a href="/transactions/">Transactions</a>
    </div>

    <!-- ── Main Content ── -->
    <div class="main">

        <div class="page-header">
            <h1>↔ Transfer Money</h1>
            <p>Move funds between two accounts in real time.</p>
        </div>

        <div class="form-card">

            <div class="form-section-header">Transfer Details</div>

            <!--
                Field names (sender, receiver, amount) preserved exactly
                as used by the transfer() view in views.py.
            -->
            <form method="POST">
                {% csrf_token %}

                <!-- Sender & Receiver side by side on wide screens -->
                <div class="field-row">
                    <div class="field-group">
                        <label for="sender">Sender Account No.</label>
                        <input id="sender"
                               type="number"
                               name="sender"
                               placeholder="e.g. 100001"
                               required min="1">
                    </div>

                    <div class="transfer-arrow">→</div>

                    <div class="field-group">
                        <label for="receiver">Receiver Account No.</label>
                        <input id="receiver"
                               type="number"
                               name="receiver"
                               placeholder="e.g. 100002"
                               required min="1">
                    </div>
                </div>

                <div class="field-group">
                    <label for="amount">Transfer Amount (₹)</label>
                    <input id="amount"
                           type="number"
                           name="amount"
                           placeholder="e.g. 1000.00"
                           step="0.01" min="1" required>
                </div>

                <button type="submit" class="btn-submit">
                    ↔ Transfer Funds
                </button>
            </form>

            <!-- Success / error feedback from view context -->
            {% if success %}
            <div class="feedback-banner success">
                <div class="fb-title">✅ {{ success }}</div>
            </div>
            {% endif %}

            {% if error %}
            <div class="feedback-banner error">
                <div class="fb-title">⚠ {{ error }}</div>
            </div>
            {% endif %}

        </div>

        <p class="back-link">← Back to <a href="/">Dashboard</a></p>

    </div>

</body>
</html>
