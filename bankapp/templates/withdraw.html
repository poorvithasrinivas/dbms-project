<!DOCTYPE html>
<html>

<head>

    <title>Withdraw Money</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            padding-top:100px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:40px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
        }

        button{
            width:95%;
            padding:12px;
            background:blue;
            color:white;
            border:none;
        }

        h3{
            color:green;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Withdraw Money</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="number"
               name="account_number"
               placeholder="Enter Account Number"
               required>

        <input type="number"
               step="0.01"
               name="amount"
               placeholder="Enter Amount"
               required>

        <button type="submit">
            Withdraw
        </button>

    </form>

    <h3>{{ success }}</h3>

    <h2>
        Updated Balance: ₹ {{ balance }}
    </h2>

</div>

</body>
</html>
